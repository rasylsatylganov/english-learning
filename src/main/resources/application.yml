spring:
  application:
    name: english-learning

  datasource:
    url: jdbc:sqlite:english-learning.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    hibernate:
      ddl-auto: none

    show-sql: true

    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

server:
  port: 8080
